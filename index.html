<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Researcher Network</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
      background: #0d1117; color: #c9d1d9;
    }

    /* ── Header ── */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 48px;
      background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
    }
    #header h1 { font-size: 15px; font-weight: 600; color: #e6edf3; }
    #header-controls { display: flex; align-items: center; gap: 10px; }

    .btn {
      padding: 5px 12px; border: 1px solid #30363d; border-radius: 6px;
      background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 12px;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #30363d; border-color: #8b949e; }

    .toggle-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; cursor: pointer; user-select: none;
    }
    .toggle-label input { accent-color: #388bfd; cursor: pointer; }

    /* ── Layout ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    #sidebar {
      width: 265px; background: #161b22; border-right: 1px solid #30363d;
      overflow-y: auto; flex-shrink: 0; padding: 10px 10px 20px;
    }

    .section { margin-bottom: 16px; }
    .section h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em;
      color: #8b949e; margin-bottom: 8px; padding-bottom: 4px;
      border-bottom: 1px solid #21262d;
    }

    #search-input {
      width: 100%; padding: 6px 10px; border-radius: 6px;
      border: 1px solid #30363d; background: #0d1117; color: #c9d1d9; font-size: 12px;
    }
    #search-input:focus { outline: none; border-color: #388bfd; }
    #search-btn { width: 100%; margin-top: 6px; }

    .slider-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    #pub-slider { flex: 1; accent-color: #388bfd; cursor: pointer; }

    .filter-controls { display: flex; gap: 5px; margin-bottom: 6px; }
    .filter-controls .btn { flex: 1; font-size: 11px; padding: 3px 6px; }

    #institute-list { max-height: 240px; overflow-y: auto; }
    .filter-label {
      display: flex; align-items: center; gap: 6px;
      padding: 2px 3px; border-radius: 3px;
      cursor: pointer; font-size: 11px; line-height: 1.5;
    }
    .filter-label:hover { background: #21262d; }
    .filter-label input { cursor: pointer; accent-color: #388bfd; flex-shrink: 0; }
    .filter-label .inst-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .filter-label .inst-count { margin-left: auto; color: #6e7681; font-size: 10px; padding-left: 4px; }

    .legend-item { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 11px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── Graph ── */
    #graph-container { flex: 1; position: relative; overflow: hidden; background: #0d1117; }
    #vis-container { position: absolute; inset: 0; }

    /* ── Loading ── */
    #loading-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(22,27,34,0.96); padding: 22px 30px; border-radius: 10px;
      border: 1px solid #30363d; text-align: center; z-index: 10; min-width: 220px;
    }
    .spinner {
      width: 28px; height: 28px; border: 3px solid #30363d; border-top-color: #388bfd;
      border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 12px; color: #388bfd; }

    /* ── Popup ── */
    #popup {
      position: absolute; display: none; z-index: 20;
      background: rgba(22,27,34,0.97); border: 1px solid #388bfd;
      border-radius: 8px; padding: 12px 14px 10px;
      max-width: 290px; min-width: 180px;
      font-size: 12px; line-height: 1.55;
      box-shadow: 0 6px 28px rgba(0,0,0,0.55);
    }
    #popup-close {
      position: absolute; top: 5px; right: 9px;
      background: none; border: none; color: #6e7681;
      cursor: pointer; font-size: 17px; line-height: 1; padding: 0;
    }
    #popup-close:hover { color: #e6edf3; }
    #popup-author { font-weight: 600; font-size: 13px; color: #388bfd; margin-bottom: 5px; padding-right: 18px; word-break: break-word; }
    #popup-affil  { color: #8b949e; margin-bottom: 4px; word-break: break-word; }
    #popup-meta   { color: #6e7681; }

    /* ── Status badge ── */
    #node-count {
      position: absolute; bottom: 10px; right: 10px;
      font-size: 11px; color: #6e7681;
      background: rgba(22,27,34,0.8); padding: 3px 9px;
      border-radius: 4px; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="header">
  <h1>Researcher Network</h1>
  <div id="header-controls">
    <label class="toggle-label">
      <input type="checkbox" id="toggle-labels"> Show All Names
    </label>
    <button class="btn" id="reset-view-btn">Reset View</button>
  </div>
</div>

<div id="main">
  <div id="sidebar">

    <div class="section">
      <h3>Search Author</h3>
      <input type="text" id="search-input" placeholder="Type author name…" list="author-dl" autocomplete="off">
      <datalist id="author-dl"></datalist>
      <button class="btn" id="search-btn">Zoom to Author</button>
    </div>

    <div class="section">
      <h3>Min Publications: <span id="pub-val">–</span></h3>
      <div class="slider-row">
        <input type="range" id="pub-slider" min="1" max="100" value="1">
      </div>
    </div>

    <div class="section">
      <h3>Institutes</h3>
      <div class="filter-controls">
        <button class="btn" id="select-all-btn">All</button>
        <button class="btn" id="clear-all-btn">None</button>
      </div>
      <div id="institute-list"></div>
    </div>

    <div class="section">
      <h3>Cluster Colors</h3>
      <div id="legend-list"></div>
    </div>

  </div>

  <div id="graph-container">
    <div id="vis-container"></div>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-text">Loading graph…</div>
    </div>
    <div id="popup">
      <button id="popup-close">×</button>
      <div id="popup-author"></div>
      <div id="popup-affil"></div>
      <div id="popup-meta"></div>
    </div>
    <div id="node-count"></div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const HIGHLIGHT_COLOR = '#ffffff';
const OTHER_COLOR     = '#4a5568';

let allNodes          = new Map();   // id → {pub, aff, color, cluster, inst}
let allInstitutes     = [];          // [{name, color, count}]
let allClusters       = [];          // [{id, color, size}]
let selectedInstitutes = new Set();
let currentMinPub     = 1;
let minPubInData      = 1;
let maxPubInData      = 1;

let network           = null;
let nodesDS           = null;
let edgesDS           = null;
let showLabels        = false;

// ── Helpers ───────────────────────────────────────────────────────────────────
function setLoading(msg) {
  const el = document.getElementById('loading-overlay');
  if (!msg) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  document.getElementById('loading-text').textContent = msg;
}

function nodeSize(pub) { return 4 + Math.sqrt(pub) * 8; }

function isNodeVisible(id, data) {
  return data.pub >= currentMinPub && selectedInstitutes.has(data.inst);
}

// ── Load graph.json ───────────────────────────────────────────────────────────
async function loadGraph() {
  setLoading('Loading graph…');

  const resp = await fetch('graph.json');
  if (!resp.ok) throw new Error(`Cannot load graph.json: ${resp.status} ${resp.statusText}`);
  const data = await resp.json();

  const { meta, institutes, clusters, nodes, edges } = data;

  minPubInData  = meta.min_pub;
  maxPubInData  = meta.max_pub;
  currentMinPub = meta.min_pub;

  // Configure slider to match data range
  const slider = document.getElementById('pub-slider');
  slider.min   = meta.min_pub;
  slider.max   = meta.max_pub;
  slider.value = meta.min_pub;
  document.getElementById('pub-val').textContent = meta.min_pub;

  // Build node map
  for (const n of nodes) {
    allNodes.set(n.id, { pub: n.pub, aff: n.aff, color: n.color, cluster: n.cluster, inst: n.inst, x: n.x, y: n.y });
  }

  allInstitutes = institutes;
  allClusters   = clusters || [];
  selectedInstitutes = new Set(institutes.map(i => i.name));

  buildInstituteUI();
  buildClusterLegend();
  populateDatalist();
  buildNetwork(nodes, edges);
}

// ── Build vis-network (no physics — positions are pre-computed) ───────────────
function buildNetwork(jsonNodes, jsonEdges) {
  setLoading('Rendering…');

  // ── Nodes ──
  const visNodes = jsonNodes.map(n => ({
    id:     n.id,
    x:      n.x,
    y:      n.y,
    label:  '',
    size:   nodeSize(n.pub),
    hidden: false,   // all visible initially (slider starts at minPub)
    color: {
      background: n.color,
      border:     n.color,
      hover:      { background: '#b0c8ff', border: '#b0c8ff' },
      highlight:  { background: '#58a6ff', border: '#58a6ff' }
    },
    font: { color: '#c9d1d9', size: 11, face: 'sans-serif', strokeWidth: 2, strokeColor: '#0d1117' }
  }));

  // ── Edges — visible for weight > 5 connections ──
  const visEdges = [];

  for (const e of jsonEdges) {
    const id = `__e_${e.s < e.t ? e.s : e.t}||${e.s < e.t ? e.t : e.s}`;
    visEdges.push({ id, from: e.s, to: e.t, value: e.w, hidden: false, physics: false });
  }

  nodesDS = new vis.DataSet(visNodes);
  edgesDS = new vis.DataSet(visEdges);

  network = new vis.Network(
    document.getElementById('vis-container'),
    { nodes: nodesDS, edges: edgesDS },
    {
      physics: { enabled: false },   // positions already computed
      nodes:   { shape: 'dot', borderWidth: 0, chosen: false },
      edges: {
        smooth: false,
        color: { color: 'rgba(180,180,180,0.18)', hover: 'rgba(88,166,255,0.85)', highlight: 'rgba(88,166,255,0.85)' },
        width: 0.8, hoverWidth: 2, selectionWidth: 0
      },
      interaction: {
        hover: true, tooltipDelay: 0,
        navigationButtons: false, keyboard: false,
        multiselect: false, selectConnectedEdges: false
      }
    }
  );

  network.on('click',      ({ nodes: ns }) => { ns.length ? onClickNode(ns[0]) : hidePopup(); });
  network.on('dragStart',  ()         => hidePopup());

  updateNodeCount();
  setLoading(null);
}


// ── Click: info popup ─────────────────────────────────────────────────────────
function onClickNode(nodeId) {
  const d = allNodes.get(nodeId);
  if (!d) return;

  const parts = d.aff ? d.aff.split(';').map(s => s.trim()).filter(Boolean) : [];
  const affilText = parts.length === 0 ? 'Affiliation not available'
    : parts.length === 1 ? parts[0]
    : `${parts[0]}  (+${parts.length - 1} more)`;

  document.getElementById('popup-author').textContent = nodeId;
  document.getElementById('popup-affil').textContent  = affilText;
  document.getElementById('popup-meta').textContent   = `Publications: ${d.pub}`;

  const popup = document.getElementById('popup');
  popup.style.display = 'block';

  const canvasPos = network.getPositions([nodeId])[nodeId];
  if (!canvasPos) return;
  const domPos = network.canvasToDOM(canvasPos);
  const gc = document.getElementById('graph-container');
  const pw = 290, ph = 110;
  let left = domPos.x + 22, top = domPos.y - 40;
  if (left + pw > gc.clientWidth  - 10) left = domPos.x - pw - 12;
  if (top  + ph > gc.clientHeight - 10) top  = gc.clientHeight - ph - 10;
  popup.style.left = Math.max(5, left) + 'px';
  popup.style.top  = Math.max(5, top)  + 'px';
}

function hidePopup() { document.getElementById('popup').style.display = 'none'; }

// ── Filtering: hide/show nodes (no rebuild needed) ────────────────────────────
function applyFilters() {
  if (!nodesDS) return;

  const updates = [];
  let visible = 0;
  for (const [id, data] of allNodes) {
    const hidden = !isNodeVisible(id, data);
    updates.push({ id, hidden });
    if (!hidden) visible++;
  }
  nodesDS.update(updates);
  updateNodeCount(visible);
}

function updateNodeCount(visibleCount) {
  if (visibleCount === undefined) {
    visibleCount = [...allNodes.keys()].filter(id => !nodesDS.get(id)?.hidden).length;
  }
  document.getElementById('node-count').textContent =
    `${visibleCount.toLocaleString()} / ${allNodes.size.toLocaleString()} authors`;
}

// ── Sidebar: institute checkboxes ─────────────────────────────────────────────
function buildInstituteUI() {
  const list = document.getElementById('institute-list');
  list.innerHTML = '';
  for (const { name, color, count } of allInstitutes) {
    const lbl = document.createElement('label');
    lbl.className = 'filter-label';

    const cb  = Object.assign(document.createElement('input'), { type: 'checkbox', checked: true });
    cb.addEventListener('change', () => {
      cb.checked ? selectedInstitutes.add(name) : selectedInstitutes.delete(name);
      applyFilters();
    });

    const dot = Object.assign(document.createElement('span'), { className: 'inst-dot' });
    dot.style.background = color;

    const nameSpan = document.createElement('span');
    nameSpan.textContent = name;
    Object.assign(nameSpan.style, { overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' });
    nameSpan.title = name;

    const countSpan = Object.assign(document.createElement('span'), {
      className: 'inst-count', textContent: count
    });

    lbl.append(cb, dot, nameSpan, countSpan);
    list.appendChild(lbl);
  }
}

// ── Sidebar: cluster color legend ─────────────────────────────────────────────
function buildClusterLegend() {
  const list = document.getElementById('legend-list');
  list.innerHTML = '';
  const top = allClusters.slice(0, 20);
  const hasOther = allClusters.length > 20;

  for (const { id, color, size } of top) {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML =
      `<div class="legend-dot" style="background:${color}"></div>` +
      `<span style="flex:1">Cluster ${id + 1}</span>` +
      `<span style="color:#6e7681;font-size:10px;padding-left:4px">${size.toLocaleString()}</span>`;
    list.appendChild(div);
  }
  if (hasOther) {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML =
      `<div class="legend-dot" style="background:${OTHER_COLOR};border:1px solid #444"></div>` +
      `<span style="color:#8b949e">Other clusters (${allClusters.length - 20})</span>`;
    list.appendChild(div);
  }
}

// ── Search datalist ───────────────────────────────────────────────────────────
function populateDatalist() {
  const dl = document.getElementById('author-dl');
  const frag = document.createDocumentFragment();
  for (const id of allNodes.keys()) {
    const opt = document.createElement('option');
    opt.value = id;
    frag.appendChild(opt);
  }
  dl.appendChild(frag);
}

// ── Search: zoom to author ────────────────────────────────────────────────────
function zoomToAuthor() {
  const raw = document.getElementById('search-input').value.trim();
  if (!raw) return;

  let name = nodesDS.get(raw) && !nodesDS.get(raw).hidden ? raw : null;
  if (!name) {
    const lower = raw.toLowerCase();
    name = nodesDS.getIds().find(id => !nodesDS.get(id).hidden && id.toLowerCase() === lower) || null;
  }

  if (!name) {
    const exists = [...allNodes.keys()].some(k => k.toLowerCase() === raw.toLowerCase());
    alert(exists
      ? `"${raw}" is not visible with the current filters.`
      : `Author "${raw}" was not found.`
    );
    return;
  }

  network.focus(name, { scale: 2.2, animation: { duration: 650, easingFunction: 'easeInOutQuad' } });

  const orig = allNodes.get(name).color;
  nodesDS.update({ id: name, color: { background: HIGHLIGHT_COLOR, border: HIGHLIGHT_COLOR } });
  setTimeout(() => nodesDS.update({ id: name, color: { background: orig, border: orig } }), 1100);
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('pub-slider').addEventListener('input', e => {
  currentMinPub = +e.target.value;
  document.getElementById('pub-val').textContent = currentMinPub;
  applyFilters();
});

document.getElementById('toggle-labels').addEventListener('change', e => {
  showLabels = e.target.checked;
  if (!nodesDS) return;
  nodesDS.update(nodesDS.getIds().map(id => ({ id, label: showLabels ? id : '' })));
});

document.getElementById('reset-view-btn').addEventListener('click', () => {
  network?.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
});

document.getElementById('popup-close').addEventListener('click', hidePopup);

document.getElementById('select-all-btn').addEventListener('click', () => {
  selectedInstitutes = new Set(allInstitutes.map(i => i.name));
  document.querySelectorAll('#institute-list input').forEach(cb => { cb.checked = true; });
  applyFilters();
});

document.getElementById('clear-all-btn').addEventListener('click', () => {
  selectedInstitutes.clear();
  document.querySelectorAll('#institute-list input').forEach(cb => { cb.checked = false; });
  applyFilters();
});

document.getElementById('search-btn').addEventListener('click', zoomToAuthor);
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') zoomToAuthor();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
loadGraph().catch(err => {
  document.getElementById('loading-overlay').innerHTML = `
    <p style="color:#f85149;font-size:13px;line-height:1.7">
      Failed to load graph.json:<br>
      <strong>${err.message}</strong><br><br>
      <span style="color:#8b949e;font-size:11px">
        Run <code style="color:#79c0ff">python precompute.py</code> first<br>
        to generate graph.json, then commit it.<br><br>
        <b>Local testing:</b><br>
        <code style="color:#79c0ff">python -m http.server 8080</code>
      </span>
    </p>`;
  document.getElementById('loading-overlay').style.display = 'block';
});
</script>
</body>
</html>
